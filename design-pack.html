<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OG Present — Дизайн-пак</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/pjH3gb0s/logo-png.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            padding: 32px 20px 80px;
            transition: background 0.3s ease;
        }
        body.pink-mode { background: #0f0510; }
        .blob {
            position: fixed;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            animation: floatBlob 20s ease-in-out infinite;
            opacity: 0.5;
            mix-blend-mode: screen;
        }
        .blob-1 { background: radial-gradient(circle, rgba(210, 180, 140, 0.55), rgba(210, 180, 140, 0.08)); top: -15%; left: -15%; width: 80vw; height: 80vw; animation-delay: 0s; }
        .blob-2 { background: radial-gradient(circle, rgba(180, 80, 100, 0.45), rgba(180, 80, 100, 0.04)); bottom: -20%; right: -20%; width: 85vw; height: 85vw; animation-delay: -7s; }
        .blob-3 { background: radial-gradient(circle, rgba(60, 100, 140, 0.4), rgba(60, 100, 140, 0.04)); top: 30%; right: -15%; width: 60vw; height: 60vw; animation-delay: -14s; }
        body.pink-mode .blob-1 { background: radial-gradient(circle, rgba(255, 140, 170, 0.6), rgba(255, 140, 170, 0.1)); }
        body.pink-mode .blob-2 { background: radial-gradient(circle, rgba(220, 90, 120, 0.5), rgba(220, 90, 120, 0.08)); }
        body.pink-mode .blob-3 { background: radial-gradient(circle, rgba(200, 70, 100, 0.45), rgba(200, 70, 100, 0.06)); }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            35% { transform: translate(6%, 4%) scale(1.08); }
            70% { transform: translate(-4%, 7%) scale(0.96); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 2; }
        .card {
            background: rgba(15, 15, 20, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 36px 32px;
            margin-bottom: 32px;
        }
        body.pink-mode .card { background: rgba(30, 10, 20, 0.55); }
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 12px;
            text-transform: uppercase;
            color: #d4cfc0;
            margin-bottom: 24px;
            border: 1px solid rgba(210, 180, 140, 0.3);
        }
        body.pink-mode .badge { color: #ffb6c1; border-color: #ffb6c1; }
        h1 { font-size: 48px; margin-bottom: 20px; }
        .price { font-size: 42px; font-weight: 800; color: #c9af7b; margin: 20px 0; }
        body.pink-mode .price { color: #ffb6c1; }
        .btn-buy {
            display: inline-block;
            background: rgba(210, 180, 140, 0.85);
            color: #0a0a0a;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-buy:hover { transform: scale(0.97); background: #c9af7b; }
        body.pink-mode .btn-buy { background: rgba(232, 106, 138, 0.9); color: #fff; }
        .feature-list { display: flex; flex-wrap: wrap; gap: 12px; margin: 30px 0; }
        .feature-item { background: rgba(255, 255, 255, 0.05); border-radius: 60px; padding: 8px 20px; font-size: 14px; }
        .site-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .site-nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(210, 180, 140, 0.4);
            padding-bottom: 4px;
            transition: all 0.2s;
        }
        .site-nav a:hover { color: #c9af7b; border-bottom-color: #c9af7b; }
        body.pink-mode .site-nav a { color: #ffb6c1; border-bottom-color: #ffb6c1; }
        .site-nav a.active { color: #c9af7b; border-bottom-color: #c9af7b; }
        body.pink-mode .site-nav a.active { color: #ffb6c1; border-bottom-color: #ffb6c1; }
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .theme-btn {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
        }
        .theme-btn.active {
            background: rgba(210, 180, 140, 0.3);
            border-color: rgba(210, 180, 140, 0.6);
        }
        body.pink-mode .theme-btn.active {
            background: rgba(255, 200, 210, 0.3);
            border-color: #ffb6c1;
        }
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(210, 180, 140, 0.5);
            border-radius: 60px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 20px;
            color: rgba(210, 180, 140, 0.8);
            transition: all 0.3s ease;
            z-index: 100;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        @media (max-width: 700px) {
            h1 { font-size: 32px; }
            .price { font-size: 32px; }
            .card { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="theme-switcher">
    <button class="theme-btn" id="themeDark">Тёмная</button>
    <button class="theme-btn" id="themePink">Пикми</button>
</div>
<button class="scroll-top" id="scrollTopBtn">↑</button>

<div class="container">
    <div class="site-nav">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="portfolio.html">Портфолио</a>
        <a href="design-pack.html" class="active">Дизайн-пак</a>
        <a href="reviews.html">Отзывы</a>
        <a href="order.html">Заказать</a>
        <a href="contacts.html">Контакты</a>
    </div>

    <div class="card">
        <div class="badge">ДИЗАЙН-ПАК BY OG PRESENT</div>
        <h1>Полный набор для дизайнера</h1>
        <div class="price">2 000 ₽</div>
        <div class="feature-list">
            <span class="feature-item">Гайды</span>
            <span class="feature-item">Персонажи PNG</span>
            <span class="feature-item">Фоны и текстуры</span>
            <span class="feature-item">Кисти для PS</span>
            <span class="feature-item">Шаблоны PSD</span>
            <span class="feature-item">Стили текста</span>
        </div>
        <a href="https://t.me/worker_hight?text=Здравствуйте! Хочу приобрести Дизайн-пак by OG Present за 2000 ₽." class="btn-buy" target="_blank">Купить пак</a>
        <div style="margin-top: 30px; font-size: 14px; opacity: 0.7;">После покупки вы получите архив со всеми материалами</div>
    </div>
</div>

<script>
    const themeDarkBtn = document.getElementById('themeDark');
    const themePinkBtn = document.getElementById('themePink');
    function setTheme(theme) {
        document.body.classList.remove('pink-mode');
        if (theme === 'pink') {
            document.body.classList.add('pink-mode');
            themeDarkBtn.classList.remove('active');
            themePinkBtn.classList.add('active');
        } else {
            themeDarkBtn.classList.add('active');
            themePinkBtn.classList.remove('active');
        }
        localStorage.setItem('ogpresent-theme', theme);
    }
    themeDarkBtn.addEventListener('click', () => setTheme('dark'));
    themePinkBtn.addEventListener('click', () => setTheme('pink'));
    const savedTheme = localStorage.getItem('ogpresent-theme');
    if (savedTheme === 'pink') setTheme('pink');
    else setTheme('dark');

    const scrollTopBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 200) scrollTopBtn.classList.add('visible');
        else scrollTopBtn.classList.remove('visible');
    });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</body>
</html>
