<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OG Present — Главная</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/pjH3gb0s/logo-png.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }
        body.pink-mode { background: #0f0510; }
        .blob {
            position: fixed;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            animation: floatBlob 20s ease-in-out infinite;
            opacity: 0.5;
            mix-blend-mode: screen;
        }
        .blob-1 {
            background: radial-gradient(circle, rgba(210, 180, 140, 0.55), rgba(210, 180, 140, 0.08));
            top: -15%; left: -15%; width: 80vw; height: 80vw; animation-delay: 0s;
        }
        .blob-2 {
            background: radial-gradient(circle, rgba(180, 80, 100, 0.45), rgba(180, 80, 100, 0.04));
            bottom: -20%; right: -20%; width: 85vw; height: 85vw; animation-delay: -7s;
        }
        .blob-3 {
            background: radial-gradient(circle, rgba(60, 100, 140, 0.4), rgba(60, 100, 140, 0.04));
            top: 30%; right: -15%; width: 60vw; height: 60vw; animation-delay: -14s;
        }
        body.pink-mode .blob-1 { background: radial-gradient(circle, rgba(255, 140, 170, 0.6), rgba(255, 140, 170, 0.1)); }
        body.pink-mode .blob-2 { background: radial-gradient(circle, rgba(220, 90, 120, 0.5), rgba(220, 90, 120, 0.08)); }
        body.pink-mode .blob-3 { background: radial-gradient(circle, rgba(200, 70, 100, 0.45), rgba(200, 70, 100, 0.06)); }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            35% { transform: translate(6%, 4%) scale(1.08); }
            70% { transform: translate(-4%, 7%) scale(0.96); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .container {
            text-align: center;
            z-index: 2;
            position: relative;
            max-width: 600px;
            width: 90%;
            padding: 40px 20px;
        }
        .logo-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            background: transparent;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .logo-img:hover { transform: scale(1.02); }
        .studio-name {
            font-size: 14px;
            letter-spacing: 4px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .slogan {
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 60px;
            line-height: 1.4;
        }
        body.pink-mode .slogan { color: #ffb6c1; }
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeInUp 0.6s ease-out;
        }
        .nav-btn {
            display: block;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(210, 180, 140, 0.4);
            border-radius: 60px;
            padding: 18px 24px;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }
        .nav-btn:hover {
            background: rgba(210, 180, 140, 0.2);
            transform: translateY(-3px);
            border-color: rgba(210, 180, 140, 0.8);
        }
        body.pink-mode .nav-btn {
            border-color: #ffb6c1;
        }
        body.pink-mode .nav-btn:hover {
            background: rgba(255, 200, 210, 0.2);
            border-color: #ffb6c1;
        }
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .theme-btn {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #ffffff;
        }
        .theme-btn.active {
            background: rgba(210, 180, 140, 0.3);
            border-color: rgba(210, 180, 140, 0.6);
        }
        body.pink-mode .theme-btn.active {
            background: rgba(255, 200, 210, 0.3);
            border-color: #ffb6c1;
        }
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(210, 180, 140, 0.5);
            border-radius: 60px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 20px;
            color: rgba(210, 180, 140, 0.8);
            transition: all 0.3s ease;
            z-index: 100;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        .scroll-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 700px) {
            .logo-img { width: 120px; height: 120px; }
            .slogan { font-size: 20px; margin-bottom: 40px; }
            .nav-btn { padding: 14px 20px; font-size: 16px; }
            .theme-btn { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="theme-switcher">
    <button class="theme-btn" id="themeDark">Тёмная</button>
    <button class="theme-btn" id="themePink">Пикми</button>
</div>
<button class="scroll-top" id="scrollTopBtn">↑</button>

<div class="container">
    <div class="logo-block">
        <img src="https://i.ibb.co/pjH3gb0s/logo-png.png" alt="OG Present" class="logo-img">
        <div class="studio-name">OG PRESENT — DESIGN & EDIT</div>
    </div>
    <div class="slogan">Дизайн и монтаж для YouTube</div>
    <div class="nav-buttons">
        <a href="services.html" class="nav-btn">Услуги и цены</a>
        <a href="portfolio.html" class="nav-btn">Портфолио</a>
        <a href="design-pack.html" class="nav-btn">Дизайн-пак</a>
        <a href="feedback.html" class="nav-btn">Отзывы</a>
        <a href="order.html" class="nav-btn">Заказать</a>
        <a href="contacts.html" class="nav-btn">Контакты</a>
    </div>
</div>

<script>
    const themeDarkBtn = document.getElementById('themeDark');
    const themePinkBtn = document.getElementById('themePink');
    function setTheme(theme) {
        document.body.classList.remove('pink-mode');
        if (theme === 'pink') {
            document.body.classList.add('pink-mode');
            themeDarkBtn.classList.remove('active');
            themePinkBtn.classList.add('active');
        } else {
            themeDarkBtn.classList.add('active');
            themePinkBtn.classList.remove('active');
        }
        localStorage.setItem('ogpresent-theme', theme);
    }
    themeDarkBtn.addEventListener('click', () => setTheme('dark'));
    themePinkBtn.addEventListener('click', () => setTheme('pink'));
    const savedTheme = localStorage.getItem('ogpresent-theme');
    if (savedTheme === 'pink') setTheme('pink');
    else setTheme('dark');

    const scrollTopBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 200) scrollTopBtn.classList.add('visible');
        else scrollTopBtn.classList.remove('visible');
    });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</body>
</html>
