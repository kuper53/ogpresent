<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OG Present — Портфолио</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/pjH3gb0s/logo-png.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            padding: 32px 20px 80px;
            transition: background 0.3s ease;
        }
        body.pink-mode { background: #0f0510; }
        .blob {
            position: fixed;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            animation: floatBlob 20s ease-in-out infinite;
            opacity: 0.5;
            mix-blend-mode: screen;
        }
        .blob-1 { background: radial-gradient(circle, rgba(210, 180, 140, 0.55), rgba(210, 180, 140, 0.08)); top: -15%; left: -15%; width: 80vw; height: 80vw; animation-delay: 0s; }
        .blob-2 { background: radial-gradient(circle, rgba(180, 80, 100, 0.45), rgba(180, 80, 100, 0.04)); bottom: -20%; right: -20%; width: 85vw; height: 85vw; animation-delay: -7s; }
        .blob-3 { background: radial-gradient(circle, rgba(60, 100, 140, 0.4), rgba(60, 100, 140, 0.04)); top: 30%; right: -15%; width: 60vw; height: 60vw; animation-delay: -14s; }
        body.pink-mode .blob-1 { background: radial-gradient(circle, rgba(255, 140, 170, 0.6), rgba(255, 140, 170, 0.1)); }
        body.pink-mode .blob-2 { background: radial-gradient(circle, rgba(220, 90, 120, 0.5), rgba(220, 90, 120, 0.08)); }
        body.pink-mode .blob-3 { background: radial-gradient(circle, rgba(200, 70, 100, 0.45), rgba(200, 70, 100, 0.06)); }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            35% { transform: translate(6%, 4%) scale(1.08); }
            70% { transform: translate(-4%, 7%) scale(0.96); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 2; }
        .site-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .site-nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(210, 180, 140, 0.4);
            padding-bottom: 4px;
            transition: all 0.2s;
        }
        .site-nav a:hover { color: #c9af7b; border-bottom-color: #c9af7b; }
        body.pink-mode .site-nav a { color: #ffb6c1; border-bottom-color: #ffb6c1; }
        .site-nav a.active { color: #c9af7b; border-bottom-color: #c9af7b; }
        body.pink-mode .site-nav a.active { color: #ffb6c1; border-bottom-color: #ffb6c1; }
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .theme-btn {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
        }
        .theme-btn.active {
            background: rgba(210, 180, 140, 0.3);
            border-color: rgba(210, 180, 140, 0.6);
        }
        body.pink-mode .theme-btn.active {
            background: rgba(255, 200, 210, 0.3);
            border-color: #ffb6c1;
        }
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(210, 180, 140, 0.5);
            border-radius: 60px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 20px;
            color: rgba(210, 180, 140, 0.8);
            transition: all 0.3s ease;
            z-index: 100;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .portfolio-card {
            background: rgba(20, 20, 30, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(210, 180, 140, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .portfolio-card:hover {
            transform: translateY(-4px);
            background: rgba(30, 30, 45, 0.5);
            border-color: rgba(210, 180, 140, 0.4);
        }
        body.pink-mode .portfolio-card {
            background: rgba(255, 200, 210, 0.1);
            border-color: #ffb6c1;
        }
        body.pink-mode .portfolio-card:hover {
            background: rgba(255, 200, 210, 0.2);
            border-color: #ffb6c1;
        }
        .portfolio-card iframe {
            width: 100%;
            border-radius: 16px;
            aspect-ratio: 16 / 9;
        }
        .portfolio-card img {
            width: 100%;
            border-radius: 16px;
            display: block;
        }
        .portfolio-card h3 {
            margin-top: 16px;
            font-size: 18px;
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 12px;
            text-transform: uppercase;
            color: #d4cfc0;
            margin-bottom: 24px;
            border: 1px solid rgba(210, 180, 140, 0.3);
        }
        body.pink-mode .badge { color: #ffb6c1; border-color: #ffb6c1; }
        h1 { font-size: 48px; font-weight: 700; letter-spacing: -2px; background: linear-gradient(135deg, #ffffff 0%, #c9af7b 100%); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 20px; text-align: center; }
        body.pink-mode h1 { background: linear-gradient(135deg, #ffffff 0%, #ffb6c1 100%); }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(210, 180, 140, 0.3);
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 28px;
            display: block;
            margin: 20px;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
        }
        .modal-close:hover { color: #c9af7b; }
        @media (max-width: 700px) {
            h1 { font-size: 32px; }
            .portfolio-grid { grid-template-columns: 1fr; gap: 16px; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="theme-switcher">
    <button class="theme-btn" id="themeDark">Тёмная</button>
    <button class="theme-btn" id="themePink">Пикми</button>
</div>
<button class="scroll-top" id="scrollTopBtn">↑</button>

<div class="container">
    <div class="site-nav">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="portfolio.html" class="active">Портфолио</a>
        <a href="design-pack.html">Дизайн-пак</a>
        <a href="reviews.html">Отзывы</a>
        <a href="order.html">Заказать</a>
        <a href="contacts.html">Контакты</a>
    </div>

    <div class="badge" style="display: table; margin-left: auto; margin-right: auto;">НАШИ РАБОТЫ</div>
    <h1>Портфолио</h1>
    <div class="portfolio-grid" id="portfolioGrid"></div>
</div>

<div id="imageModal" class="modal">
    <div class="modal-content">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="">
    </div>
</div>

<script>
    const themeDarkBtn = document.getElementById('themeDark');
    const themePinkBtn = document.getElementById('themePink');
    function setTheme(theme) {
        document.body.classList.remove('pink-mode');
        if (theme === 'pink') {
            document.body.classList.add('pink-mode');
            themeDarkBtn.classList.remove('active');
            themePinkBtn.classList.add('active');
        } else {
            themeDarkBtn.classList.add('active');
            themePinkBtn.classList.remove('active');
        }
        localStorage.setItem('ogpresent-theme', theme);
    }
    themeDarkBtn.addEventListener('click', () => setTheme('dark'));
    themePinkBtn.addEventListener('click', () => setTheme('pink'));
    const savedTheme = localStorage.getItem('ogpresent-theme');
    if (savedTheme === 'pink') setTheme('pink');
    else setTheme('dark');

    const scrollTopBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 200) scrollTopBtn.classList.add('visible');
        else scrollTopBtn.classList.remove('visible');
    });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    const works = [
        { type: 'video', title: 'Пример монтажа 1', url: 'https://www.youtube.com/embed/v3pcsw_Lp-o' },
        { type: 'video', title: 'Пример монтажа 2', url: 'https://www.youtube.com/embed/W49n04H54O4' },
        { type: 'video', title: 'Пример монтажа 3', url: 'https://www.youtube.com/embed/MG4jcmNA1rs' },
        { type: 'image', title: 'Превью 1', url: 'https://i.ibb.co/0RTkBF0r/photo-2026-02-14-12-23-45.jpg' },
        { type: 'image', title: 'Превью 2', url: 'https://i.ibb.co/zWZjGzDK/photo-2026-03-05-21-05-13.jpg' },
        { type: 'image', title: 'Превью 3', url: 'https://i.ibb.co/fz3NvhRw/photo-2026-04-12-18-38-59.jpg' },
        { type: 'image', title: 'Превью 4', url: 'https://i.ibb.co/Sw5Q8VMy/photo-2026-04-23-22-28-58.jpg' },
        { type: 'image', title: 'Превью 5', url: 'https://i.ibb.co/svG4t66Q/photo-2026-05-04-22-51-11.jpg' },
        { type: 'image', title: 'Оформление канала (шапка)', url: 'https://i.ibb.co/0jrxcZnP/photo-2026-05-14-23-20-21.jpg' },
        { type: 'image', title: 'Оформление канала (аватарка)', url: 'https://i.ibb.co/MDZ0Kdmr/photo-2026-05-14-23-20-22.jpg' }
    ];

    const container = document.getElementById('portfolioGrid');
    const modal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const modalClose = document.querySelector('.modal-close');

    function openModal(imgSrc) {
        modalImage.src = imgSrc;
        modal.classList.add('active');
    }

    modalClose.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

    works.forEach(work => {
        const card = document.createElement('div');
        card.className = 'portfolio-card';
        if (work.type === 'video') {
            card.innerHTML = `
                <iframe src="${work.url}" frameborder="0" allowfullscreen></iframe>
                <h3>${work.title}</h3>
            `;
        } else {
            const img = document.createElement('img');
            img.src = work.url;
            img.alt = work.title;
            img.style.cursor = 'pointer';
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                openModal(work.url);
            });
            card.appendChild(img);
            const title = document.createElement('h3');
            title.textContent = work.title;
            card.appendChild(title);
        }
        container.appendChild(card);
    });
</script>
</body>
</html>
