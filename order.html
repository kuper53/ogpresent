<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OG Present — Заказать</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/pjH3gb0s/logo-png.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            padding: 32px 20px 80px;
            transition: background 0.3s ease;
        }
        body.pink-mode { background: #0f0510; }
        .blob {
            position: fixed;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            animation: floatBlob 20s ease-in-out infinite;
            opacity: 0.5;
            mix-blend-mode: screen;
        }
        .blob-1 { background: radial-gradient(circle, rgba(210, 180, 140, 0.55), rgba(210, 180, 140, 0.08)); top: -15%; left: -15%; width: 80vw; height: 80vw; animation-delay: 0s; }
        .blob-2 { background: radial-gradient(circle, rgba(180, 80, 100, 0.45), rgba(180, 80, 100, 0.04)); bottom: -20%; right: -20%; width: 85vw; height: 85vw; animation-delay: -7s; }
        .blob-3 { background: radial-gradient(circle, rgba(60, 100, 140, 0.4), rgba(60, 100, 140, 0.04)); top: 30%; right: -15%; width: 60vw; height: 60vw; animation-delay: -14s; }
        body.pink-mode .blob-1 { background: radial-gradient(circle, rgba(255, 140, 170, 0.6), rgba(255, 140, 170, 0.1)); }
        body.pink-mode .blob-2 { background: radial-gradient(circle, rgba(220, 90, 120, 0.5), rgba(220, 90, 120, 0.08)); }
        body.pink-mode .blob-3 { background: radial-gradient(circle, rgba(200, 70, 100, 0.45), rgba(200, 70, 100, 0.06)); }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            35% { transform: translate(6%, 4%) scale(1.08); }
            70% { transform: translate(-4%, 7%) scale(0.96); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .container { max-width: 700px; margin: 0 auto; position: relative; z-index: 2; }
        .card {
            background: rgba(15, 15, 20, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 36px 32px;
            margin-bottom: 32px;
        }
        body.pink-mode .card { background: rgba(30, 10, 20, 0.55); }
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 12px;
            text-transform: uppercase;
            color: #d4cfc0;
            margin-bottom: 24px;
            border: 1px solid rgba(210, 180, 140, 0.3);
        }
        body.pink-mode .badge { color: #ffb6c1; border-color: #ffb6c1; }
        h1 { font-size: 48px; font-weight: 700; letter-spacing: -2px; background: linear-gradient(135deg, #ffffff 0%, #c9af7b 100%); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 20px; text-align: center; }
        body.pink-mode h1 { background: linear-gradient(135deg, #ffffff 0%, #ffb6c1 100%); }
        .site-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .site-nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(210, 180, 140, 0.4);
            padding-bottom: 4px;
            transition: all 0.2s;
        }
        .site-nav a:hover { color: #c9af7b; border-bottom-color: #c9af7b; }
        body.pink-mode .site-nav a { color: #ffb6c1; border-bottom-color: #ffb6c1; }
        .site-nav a.active { color: #c9af7b; border-bottom-color: #c9af7b; }
        body.pink-mode .site-nav a.active { color: #ffb6c1; border-bottom-color: #ffb6c1; }
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .theme-btn {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
        }
        .theme-btn.active {
            background: rgba(210, 180, 140, 0.3);
            border-color: rgba(210, 180, 140, 0.6);
        }
        body.pink-mode .theme-btn.active {
            background: rgba(255, 200, 210, 0.3);
            border-color: #ffb6c1;
        }
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(210, 180, 140, 0.5);
            border-radius: 60px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 20px;
            color: rgba(210, 180, 140, 0.8);
            transition: all 0.3s ease;
            z-index: 100;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: rgba(255, 255, 255, 0.8); }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border-radius: 16px; border: 1px solid rgba(210, 180, 140, 0.4); background: rgba(0, 0, 0, 0.3); color: #fff; font-size: 15px; font-family: inherit; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        body.pink-mode .form-group input, body.pink-mode .form-group textarea { border-color: #ffb6c1; }
        .submit-btn {
            background: rgba(210, 180, 140, 0.85);
            color: #0a0a0a;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .submit-btn:hover { transform: scale(0.98); background: #c9af7b; }
        body.pink-mode .submit-btn { background: rgba(232, 106, 138, 0.9); color: #fff; }
        .form-message { margin-top: 15px; padding: 10px; border-radius: 12px; text-align: center; display: none; }
        .form-message.success { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .form-message.error { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }
        .service-selection { margin-bottom: 20px; }
        .service-select-btn {
            width: 100%;
            background: rgba(210, 180, 140, 0.15);
            border: 1px solid rgba(210, 180, 140, 0.4);
            color: #c9af7b;
            padding: 12px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
        }
        body.pink-mode .service-select-btn { border-color: #ffb6c1; color: #ffb6c1; }
        .service-buttons {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }
        .service-buttons.show { display: flex; }
        .service-btn {
            background: rgba(210, 180, 140, 0.1);
            border: 1px solid rgba(210, 180, 140, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
        }
        body.pink-mode .service-btn { border-color: #ffb6c1; }
        .selected-service {
            background: rgba(210, 180, 140, 0.15);
            border: 1px solid rgba(210, 180, 140, 0.4);
            border-radius: 60px;
            padding: 10px 15px;
            margin-top: 10px;
            font-size: 14px;
            color: #c9af7b;
            word-break: break-word;
        }
        body.pink-mode .selected-service { border-color: #ffb6c1; color: #ffb6c1; }
        .order-toggle-btn {
            background: rgba(210, 180, 140, 0.85);
            color: #0a0a0a;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        body.pink-mode .order-toggle-btn { background: rgba(232, 106, 138, 0.9); color: #fff; }
        .order-form-container { display: none; }
        .order-form-container.open { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 700px) {
            h1 { font-size: 32px; }
            .card { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="theme-switcher">
    <button class="theme-btn" id="themeDark">Тёмная</button>
    <button class="theme-btn" id="themePink">Пикми</button>
</div>
<button class="scroll-top" id="scrollTopBtn">↑</button>

<div class="container">
    <div class="site-nav">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="portfolio.html">Портфолио</a>
        <a href="design-pack.html">Дизайн-пак</a>
        <a href="feedback.html">Отзывы</a>
        <a href="order.html" class="active">Заказать</a>
        <a href="contacts.html">Контакты</a>
    </div>

    <div class="card">
        <div class="badge">ОФОРМИТЬ ЗАКАЗ</div>
        <h1>Заказать услугу</h1>
        <button class="order-toggle-btn" id="orderToggleBtn">Оставить заявку</button>
        <div class="order-form-container" id="orderFormContainer">
            <form id="orderForm">
                <div class="form-group">
                    <label>Как к вам обращаться?</label>
                    <input type="text" id="orderName" required placeholder="Имя или псевдоним">
                </div>
                <div class="form-group">
                    <label>Telegram / ВКонтакте для связи</label>
                    <input type="text" id="orderContact" required placeholder="@username или ссылка на профиль">
                </div>
                <div class="form-group">
                    <label>Ссылка на исходники (видео, фото)</label>
                    <input type="text" id="orderLink" placeholder="Ссылка на Google Drive, Яндекс.Диск, YouTube и т.д.">
                </div>
                <div class="form-group">
                    <label>Техническое задание (пожелания)</label>
                    <textarea id="orderTz" placeholder="Опишите, что нужно сделать..."></textarea>
                </div>
                <div class="form-group service-selection">
                    <label>Выберите услугу или пакет</label>
                    <div class="service-select-btn" id="serviceSelectBtn">Выбрать услугу / пакет</div>
                    <div class="service-buttons" id="serviceButtons">
                        <div class="service-btn" data-service="Эконом (превью + монтаж) - 1400 ₽">Эконом — 1400 ₽</div>
                        <div class="service-btn" data-service="Стандарт (Эконом + сценарий + SEO) - 2000 ₽">Стандарт — 2000 ₽</div>
                        <div class="service-btn" data-service="Премиум (Стандарт + 3 шортса) - 2500 ₽">Премиум — 2500 ₽</div>
                        <div class="service-btn" data-service="Старт (превью + оформление) - 990 ₽">Старт — 990 ₽</div>
                        <div class="service-btn" data-service="Превью - 600 ₽">Превью — 600 ₽</div>
                        <div class="service-btn" data-service="Оформление (шапка + аватарка) - 800 ₽">Оформление — 800 ₽</div>
                        <div class="service-btn" data-service="Монтаж видео (до 10 мин) - 1000 ₽">Монтаж видео — 1000 ₽</div>
                        <div class="service-btn" data-service="Монтаж Shorts (до 60 сек) - 500 ₽">Монтаж Shorts — 500 ₽</div>
                    </div>
                    <div class="selected-service" id="selectedService"></div>
                </div>
                <button type="submit" class="submit-btn">Отправить заявку</button>
                <div id="orderFormMessage" class="form-message"></div>
            </form>
        </div>
    </div>
</div>

<script>
    const themeDarkBtn = document.getElementById('themeDark');
    const themePinkBtn = document.getElementById('themePink');
    function setTheme(theme) {
        document.body.classList.remove('pink-mode');
        if (theme === 'pink') {
            document.body.classList.add('pink-mode');
            themeDarkBtn.classList.remove('active');
            themePinkBtn.classList.add('active');
        } else {
            themeDarkBtn.classList.add('active');
            themePinkBtn.classList.remove('active');
        }
        localStorage.setItem('ogpresent-theme', theme);
    }
    themeDarkBtn.addEventListener('click', () => setTheme('dark'));
    themePinkBtn.addEventListener('click', () => setTheme('pink'));
    const savedTheme = localStorage.getItem('ogpresent-theme');
    if (savedTheme === 'pink') setTheme('pink');
    else setTheme('dark');

    const scrollTopBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 200) scrollTopBtn.classList.add('visible');
        else scrollTopBtn.classList.remove('visible');
    });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    const TELEGRAM_BOT_TOKEN = '8865819184:AAFliyDasbfrw6xCBj9mwEKnpm-3DO7G454';
    const TELEGRAM_CHAT_ID = '1137754377';

    const orderToggleBtn = document.getElementById('orderToggleBtn');
    const orderFormContainer = document.getElementById('orderFormContainer');
    orderToggleBtn.addEventListener('click', () => {
        orderFormContainer.classList.toggle('open');
        orderToggleBtn.textContent = orderFormContainer.classList.contains('open') ? 'Скрыть форму' : 'Оставить заявку';
    });

    const serviceSelectBtn = document.getElementById('serviceSelectBtn');
    const serviceButtons = document.getElementById('serviceButtons');
    const selectedServiceDiv = document.getElementById('selectedService');
    let currentSelectedService = '';
    serviceSelectBtn.addEventListener('click', () => serviceButtons.classList.toggle('show'));
    document.querySelectorAll('.service-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentSelectedService = btn.getAttribute('data-service');
            selectedServiceDiv.textContent = `Выбрано: ${currentSelectedService}`;
            serviceButtons.classList.remove('show');
        });
    });

    const orderForm = document.getElementById('orderForm');
    const orderFormMessage = document.getElementById('orderFormMessage');
    orderForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('orderName').value.trim();
        const contact = document.getElementById('orderContact').value.trim();
        const link = document.getElementById('orderLink').value.trim();
        const tz = document.getElementById('orderTz').value.trim();
        const service = currentSelectedService || 'не выбрано';
        if (!name || !contact) {
            orderFormMessage.textContent = 'Заполните имя и способ связи';
            orderFormMessage.className = 'form-message error';
            orderFormMessage.style.display = 'block';
            return;
        }
        const text = `НОВАЯ ЗАЯВКА\n\nИмя: ${name}\nСвязь: ${contact}\nУслуга: ${service}\nСсылка: ${link || 'не указана'}\nТЗ: ${tz || 'не указано'}`;
        try {
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: text })
            });
            if (response.ok) {
                orderFormMessage.textContent = 'Заявка отправлена! Мы свяжемся с вами.';
                orderFormMessage.className = 'form-message success';
                orderForm.reset();
                currentSelectedService = '';
                selectedServiceDiv.textContent = '';
            } else throw new Error();
        } catch (error) {
            orderFormMessage.textContent = 'Ошибка отправки. Попробуйте позже.';
            orderFormMessage.className = 'form-message error';
        }
        orderFormMessage.style.display = 'block';
        setTimeout(() => orderFormMessage.style.display = 'none', 5000);
    });
</script>
</body>
</html>
